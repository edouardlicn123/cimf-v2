{% extends "core/frames/frame_node.html" %}

{% set show_nav = true %}
{% set show_header = false %}

{% block admin_title %}
  {% if customer %}编辑{% else %}新建{% endif %}{{ node_type.name }}
{% endblock %}

{% block admin_content %}
<script src="{{ static('js/region_select.js') }}"></script>
<form method="post" novalidate>
    {{ csrf_token }}
    
    <!-- 基本信息 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">基本信息</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">客户名称 *</label>
                    <input type="text" name="customer_name" class="form-control" value="{{ customer.customer_name|default('') if customer else '' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">客户代码 <small class="text-muted">(不填则自动生成 CCN+6位数字)</small></label>
                    <input type="text" name="customer_code" class="form-control" value="{{ customer.customer_code|default('') if customer else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">客户类型</label>
                    <select name="customer_type" class="form-select">
                        <option value="">请选择</option>
                        {% if customer_types %}
                        {% for item in customer_types %}
                        <option value="{{ item.id }}" {% if customer and customer.customer_type_id == item.id %}selected{% endif %}>{{ item.name }}</option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">企业名称</label>
                    <input type="text" name="enterprise_name" class="form-control" value="{{ customer.enterprise_name|default('') if customer else '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 联系信息 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">联系信息</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">电话1</label>
                    <input type="text" name="phone1" class="form-control" value="{{ customer.phone1|default('') if customer else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">邮箱1</label>
                    <input type="email" name="email1" class="form-control" value="{{ customer.email1|default('') if customer else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">电话2（可选）</label>
                    <input type="text" name="phone2" class="form-control" value="{{ customer.phone2|default('') if customer else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">邮箱2（可选）</label>
                    <input type="email" name="email2" class="form-control" value="{{ customer.email2|default('') if customer else '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 地址信息（国内版） -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">地址信息</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">省市区</label>
                    <div class="region-select-widget">
                        <div class="row">
                            <div class="col-md-4">
                                <select class="form-select region-province" id="region-province" data-target="region-city" data-api="{{ url('core:api_regions_provinces') }}">
                                    <option value="">请选择省份</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select region-city" id="region-city" data-target="region-district" data-api="{{ url('core:api_regions_cities') }}" disabled>
                                    <option value="">请先选择省份</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <select class="form-select region-district" id="region-district" data-api="{{ url('core:api_regions_districts') }}" disabled>
                                    <option value="">请先选择城市</option>
                                </select>
                            </div>
                        </div>
                        <input type="hidden" name="region" id="id_region" value='{{ customer.region|default({})|tojson|e }}'>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">邮政编码</label>
                    <input type="text" name="postal_code" class="form-control" value="{{ customer.postal_code|default('') if customer else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">详细地址</label>
                <input type="text" name="address" class="form-control" value="{{ customer.address|default('') if customer else '' }}">
            </div>
        </div>
    </div>
    
    <!-- 社交信息 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">社交信息</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">微信号</label>
                    <input type="text" name="wechat" class="form-control" value="{{ customer.wechat|default('') if customer else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">钉钉号</label>
                    <input type="text" name="dingtalk" class="form-control" value="{{ customer.dingtalk|default('') if customer else '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 企业信息 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">企业信息（可选）</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">所属行业</label>
                    <input type="text" name="industry" class="form-control" value="{{ customer.industry|default('') if customer else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">企业性质</label>
                    <select name="enterprise_type" class="form-select">
                        <option value="">请选择</option>
                        {% if enterprise_types %}
                        {% for item in enterprise_types %}
                        <option value="{{ item.id }}" {% if customer and customer.enterprise_type_id == item.id %}selected{% endif %}>{{ item.name }}</option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">注册资本</label>
                    <input type="number" name="registered_capital" class="form-control" value="{{ customer.registered_capital|default('') if customer else '' }}">
                </div>
            </div>
        </div>
    </div>
    
    <!-- 其他 -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">其他</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">客户等级</label>
                    <select name="customer_level" class="form-select">
                        <option value="">请选择</option>
                        {% if customer_levels %}
                        {% for item in customer_levels %}
                        <option value="{{ item.id }}" {% if customer and customer.customer_level_id == item.id %}selected{% endif %}>{{ item.name }}</option>
                        {% endfor %}
                        {% endif %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">信用额度</label>
                    <input type="number" name="credit_limit" class="form-control" value="{{ customer.credit_limit|default('') if customer else '' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">网站</label>
                <input type="url" name="website" class="form-control" value="{{ customer.website|default('') if customer else '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea name="notes" class="form-control" rows="3">{{ customer.notes|default('') if customer else '' }}</textarea>
            </div>
        </div>
    </div>
    
    <!-- 提交按钮 -->
    <div class="row">
        <div class="col-12">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url('modules:node_list', node_type.slug) }}" class="btn btn-secondary">取消</a>
        </div>
    </div>
</form>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 初始化省市县联动
    const widget = document.querySelector('.region-select-widget');
    if (widget) {
        const provinceSelect = widget.querySelector('.region-province');
        const citySelect = widget.querySelector('.region-city');
        const districtSelect = widget.querySelector('.region-district');
        const hiddenInput = widget.querySelector('input[name="region"]');
        
        // 解析初始值
        let initialData = {province: '', city: '', district: ''};
        try {
            initialData = JSON.parse(hiddenInput.value) || initialData;
        } catch(e) {}
        
        // 加载省份
        fetch(provinceSelect.dataset.api)
            .then(r => r.json())
            .then(json => {
                if (json && json.data) {
                    provinceSelect.innerHTML = '<option value="">请选择省份</option>';
                    json.data.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.code;
                        opt.textContent = p.name;
                        if (p.code === initialData.province) {
                            opt.selected = true;
                        }
                        provinceSelect.appendChild(opt);
                    });
                    
                    if (initialData.province) {
                        loadCities(initialData.province, citySelect, districtSelect, initialData.city, initialData.district);
                    }
                }
            });
        
        // 省份变更
        provinceSelect.addEventListener('change', function() {
            const provinceCode = this.value;
            citySelect.innerHTML = '<option value="">请先选择省份</option>';
            districtSelect.innerHTML = '<option value="">请先选择城市</option>';
            citySelect.disabled = !provinceCode;
            districtSelect.disabled = true;
            updateHiddenInput(hiddenInput, provinceCode, '', '');
            if (provinceCode) {
                loadCities(provinceCode, citySelect, districtSelect, '', '');
            }
        });
        
        // 城市变更
        citySelect.addEventListener('change', function() {
            const cityCode = this.value;
            districtSelect.innerHTML = '<option value="">请先选择城市</option>';
            districtSelect.disabled = !cityCode;
            updateHiddenInput(hiddenInput, provinceSelect.value, cityCode, '');
            if (cityCode) {
                loadDistricts(cityCode, districtSelect, '');
            }
        });
        
        // 区县变更
        districtSelect.addEventListener('change', function() {
            updateHiddenInput(hiddenInput, provinceSelect.value, citySelect.value, this.value);
        });
    }
    
    function loadCities(provinceCode, citySelect, districtSelect, initialCity, initialDistrict) {
        fetch(citySelect.dataset.api + '?province=' + provinceCode)
            .then(r => r.json())
            .then(json => {
                if (json && json.data) {
                    citySelect.innerHTML = '<option value="">请选择城市</option>';
                    json.data.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.code;
                        opt.textContent = c.name;
                        if (c.code === initialCity) {
                            opt.selected = true;
                        }
                        citySelect.appendChild(opt);
                    });
                    citySelect.disabled = false;
                    if (initialCity) {
                        loadDistricts(initialCity, districtSelect, initialDistrict);
                    }
                }
            });
    }
    
    function loadDistricts(cityCode, districtSelect, initialDistrict) {
        fetch(districtSelect.dataset.api + '?city=' + cityCode)
            .then(r => r.json())
            .then(json => {
                if (json && json.data) {
                    districtSelect.innerHTML = '<option value="">请选择区县</option>';
                    json.data.forEach(d => {
                        const opt = document.createElement('option');
                        opt.value = d.code;
                        opt.textContent = d.name;
                        if (d.code === initialDistrict) {
                            opt.selected = true;
                        }
                        districtSelect.appendChild(opt);
                    });
                    districtSelect.disabled = false;
                }
            });
    }
    
    function updateHiddenInput(hiddenInput, province, city, district) {
        hiddenInput.value = JSON.stringify({province: province, city: city, district: district});
    }
});
</script>
{% endblock %}
