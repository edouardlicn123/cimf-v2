{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>选择导出字段 - {{ node_type.name }}</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="card mb-4">
            <div class="card-body">
                <h5>选择字段</h5>
                <div class="row">
                    {% for field in fields %}
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="field_{{ loop.index }}" 
                                   value="{{ field.name }}" id="field_{{ loop.index }}"
                                   {% if field.selected %}checked{% endif %}>
                            <label class="form-check-label" for="field_{{ loop.index }}">
                                {{ field.label }}
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5>筛选条件（可选）</h5>
                <div id="filterContainer">
                    <div class="row mb-2 filter-row">
                        <div class="col-md-5">
                            <select name="filter_field_0" class="form-select">
                                <option value="">选择字段</option>
                                {% for field in filterable_fields %}
                                <option value="{{ field.name }}">{{ field.label }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-5">
                            <input type="text" name="filter_value_0" class="form-control" placeholder="值">
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeFilter(this)">删除</button>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary btn-sm" onclick="addFilter()">添加筛选条件</button>
                
                {% if has_region %}
                <div class="row mt-3">
                    <div class="col-md-4">
                        <label>省</label>
                        <input type="text" name="filter_region_province" class="form-control" placeholder="省">
                    </div>
                    <div class="col-md-4">
                        <label>市</label>
                        <input type="text" name="filter_region_city" class="form-control" placeholder="市">
                    </div>
                    <div class="col-md-4">
                        <label>区/县</label>
                        <input type="text" name="filter_region_district" class="form-control" placeholder="区/县">
                    </div>
                </div>
                {% endif %}
            </div>
        </div>
        
        <div class="card mb-4">
            <div class="card-body">
                <h5>导出格式</h5>
                <select name="format" class="form-select" style="width: auto;">
                    <option value="csv">CSV</option>
                    <option value="xlsx">Excel (XLSX)</option>
                </select>
            </div>
        </div>
        
        <div class="mb-3">
            <button type="submit" class="btn btn-primary">下一步</button>
            <a href="{{ url('modules:export_list') }}" class="btn btn-secondary">返回</a>
        </div>
    </form>
</div>

<script>
let filterCount = 1;
const filterFields = {{ filterable_fields | tojson }};

function addFilter() {
    if (filterCount >= 6) {
        alert('最多添加6个筛选条件');
        return;
    }
    
    const container = document.getElementById('filterContainer');
    const row = document.createElement('div');
    row.className = 'row mb-2 filter-row';
    row.innerHTML = `
        <div class="col-md-5">
            <select name="filter_field_${filterCount}" class="form-select">
                <option value="">选择字段</option>
                ${filterFields.map(f => `<option value="${f.name}">${f.label}</option>`).join('')}
            </select>
        </div>
        <div class="col-md-5">
            <input type="text" name="filter_value_${filterCount}" class="form-control" placeholder="值">
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeFilter(this)">删除</button>
        </div>
    `;
    container.appendChild(row);
    filterCount++;
}

function removeFilter(btn) {
    btn.closest('.filter-row').remove();
}
</script>
{% endblock %}
