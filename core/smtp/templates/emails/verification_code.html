{% extends "emails/base_email.html" %}

{% block email_content %}
<h2>验证码</h2>

<p>您好，</p>

<p>您的验证码是：</p>

<div class="code">{{ code }}</div>

<p>验证码将在 {{ expire_minutes }} 分钟后失效。</p>

<p>如果您没有请求此验证码，请忽略此邮件。</p>

<p style="margin-top: 30px;">
    祝好，<br>
    {{ system_name | default('CIMF系统') }} 团队
</p>
{% endblock %}
