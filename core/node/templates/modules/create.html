{% extends "core/frames/frame_admin.html" %}

{% block admin_title %}创建新模块{% endblock %}

{% block admin_content %}
<div class="row">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">模块信息</h5>
            </div>
            <div class="card-body">
                <form id="createModuleForm">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="module_id" class="form-label">模块 ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="module_id" name="module_id" 
                               placeholder="例如: my_module" required>
                        <div class="form-text">只能包含字母、数字、下划线和连字符</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="name" class="form-label">模块名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="例如: 我的模块" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" name="description" 
                                  rows="3" placeholder="模块功能描述"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="icon" class="form-label">图标</label>
                        <select class="form-select" id="icon" name="icon">
                            <option value="bi-folder" selected>文件夹</option>
                            <option value="bi-people">人员</option>
                            <option value="bi-box">盒子</option>
                            <option value="bi-gear">齿轮</option>
                            <option value="bi-cart">购物车</option>
                            <option value="bi-graph-up">图表</option>
                            <option value="bi-file-text">文档</option>
                            <option value="bi-calendar">日历</option>
                        </select>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url('node:modules') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">创建模块</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('createModuleForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const form = e.target;
    const formData = new FormData(form);
    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = '创建中...';
    
    try {
        const response = await fetch('{{ url("node:module_create_action") }}', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            alert('模块创建成功！');
            window.location.href = '{{ url("node:modules") }}';
        } else {
            alert('创建失败: ' + result.error);
            submitBtn.disabled = false;
            submitBtn.textContent = '创建模块';
        }
    } catch (error) {
        alert('请求失败: ' + error);
        submitBtn.disabled = false;
        submitBtn.textContent = '创建模块';
    }
});
</script>
{% endblock %}
