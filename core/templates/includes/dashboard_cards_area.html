<!-- 功能卡片区域 -->
<div class="row mt-4">
    <div class="col-12">
        <h5 class="mb-3">快捷入口</h5>
        <div id="dashboardCardsArea" class="row g-0">
            <div class="col-4 card-slot p-1" data-position="1"></div>
            <div class="col-4 card-slot p-1" data-position="2"></div>
            <div class="col-4 card-slot p-1" data-position="3"></div>
            <div class="col-4 card-slot p-1" data-position="4"></div>
            <div class="col-4 card-slot p-1" data-position="5"></div>
            <div class="col-4 card-slot p-1" data-position="6"></div>
        </div>

</div>

<style>
.card-slot {
    height: 150px;
    min-height: 150px;
    border: 1px solid var(--border);
    background-color: var(--bg-surface);
}
.card-slot.drag-over {
    border-color: var(--primary);
    background-color: var(--primary-light);
}
.module-card {
    height: 100%;
    width: 100%;
    cursor: grab;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: none;
    border-radius: 0;
    box-shadow: var(--shadow);
}
.module-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
}
.module-card:active {
    cursor: grabbing;
}
.module-card.dragging {
    opacity: 0.5;
}
</style>

    var lunarMonth = ['正', '二', '三', '四', '五', '六', '七', '八', '九', '十', '冬', '腊'];
    var lunarDay = ['初一', '初二', '初三', '初四', '初五', '初六', '初七', '初八', '初九', '初十',
        '十一', '十二', '十三', '十四', '十五', '十六', '十七', '十八', '十九', '二十',
        '廿一', '廿二', '廿三', '廿四', '廿五', '廿六', '廿七', '廿八', '廿九', '三十'];
    var gan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    var zhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];

    function getLunarDate(date) {
        var year = date.getFullYear();
        var month = date.getMonth() + 1;
        var day = date.getDate();
        
        var offset = -1;
        var i, j, temp = 0;
        
        var baseYear = 1900;
        for (i = baseYear; i < year; i++) {
            temp = 348;
            j = 0x8000;
            while (j > 0x8) {
                temp += (lunarInfo[i - baseYear] & j) ? 1 : 0;
                j >>= 1;
            }
            offset += 365 + (lunarInfo[i - baseYear] & 0x10000) ? 30 : 29;
        }
        
        var leapMonth = lunarInfo[year - baseYear] & 0xf;
        for (i = 1; i < month; i++) {
            if (i > leapMonth) {
                offset += 30;
            } else {
                offset += (lunarInfo[year - baseYear] & (0x10000 >> i)) ? 30 : 29;
            }
        }
        offset += day;
        
        if (leapMonth > 0 && month > leapMonth) {
            offset += 30;
        }
        
        var isLeap = false;
        i = 0;
        while (i < 200 && offset > 0) {
            temp = (lunarInfo[i] & 0x10000) ? 30 : 29;
            if (offset <= temp) {
                break;
            }
            offset -= temp;
            i++;
        }
        
        var lMonth = 1;
        var lDay = offset;
        
        var leap = lunarInfo[i] & 0xf;
        if (leapMonth > 0 && i === leapMonth) {
            isLeap = true;
        }
        
        var m = 1;
        while (m < 12) {
            if (m === leap) {
                if (lDay > 30) {
                    lDay -= 30;
                    m++;
                }
                if (lDay <= 0) break;
            }
            temp = (lunarInfo[i] & (0x10000 >> m)) ? 30 : 29;
            if (lDay > temp) {
                lDay -= temp;
                m++;
            } else {
                break;
            }
        }
        lMonth = m;
        
        var yearCyclical = (year - 1900) % 60;
        
        var yearStem = gan[yearCyclical % 10];
        var yearBranch = zhi[yearCyclical % 12];
        
        var monthName = (isLeap ? '闰' : '') + lunarMonth[lMonth - 1] + '月';
        var dayName = lunarDay[lDay - 1];
        
        return {
            lunar: yearStem + yearBranch + ' ' + monthName + dayName
        };
    }

    function getCsrfToken() {
        var name = 'csrftoken';
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function saveCardPositions() {
        var positions = {};
        var slots = document.querySelectorAll('.card-slot');
        slots.forEach(function(slot) {
            var card = slot.querySelector('.module-card');
            if (card) {
                positions[slot.dataset.position] = {
                    module: card.dataset.module || 'clock'
                };
            }
        });
        
        fetch('/api/user/dashboard/cards/save/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCsrfToken()
            },
            body: JSON.stringify({ positions: positions }),
            credentials: 'include'
        }).then(function(response) {
            return response.json();
        }).then(function(data) {
            if (!data.success) {
                console.error('保存失败');
            }
        }).catch(function(error) {
            console.error('保存失败:', error);
        });
    }

    function applyCardColor(card, position) {
        var isOdd = (position % 2 === 1);
        var bgColor = isOdd ? 'var(--primary)' : 'var(--primary-light)';
        var textColor = isOdd ? '#fff' : 'var(--primary)';
        card.style.setProperty('background-color', bgColor, 'important');
        card.style.setProperty('color', textColor, 'important');
    }

    function createClockCard(position) {
        var isOdd = (position % 2 === 1);
        var bgColor = isOdd ? 'var(--primary)' : 'var(--primary-light)';
        var textColor = isOdd ? '#fff' : 'var(--primary)';
        
        var card = document.createElement('div');
        card.className = 'clock-card module-card';
        card.setAttribute('draggable', 'true');
        card.setAttribute('data-module', 'clock');
        card.style.cssText = 'background-color:' + bgColor + ' !important;color:' + textColor + ' !important;border:none;height:100%;padding:0.75rem;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:grab;';
        
        card.innerHTML = 
            '<div class="clock-date-weekday" style="font-size:0.875rem;opacity:0.75;margin-bottom:2px;">加载中... 星期</div>' +
            '<div class="clock-lunar" style="font-size:0.875rem;opacity:0.75;margin-bottom:8px;">加载中...</div>' +
            '<div class="clock-time" style="font-size:1.5rem;font-weight:bold;letter-spacing:2px;">--:--:--</div>';
        
        return card;
    }

    function createCustomerCard(moduleId, position, stats) {
        var isOdd = (position % 2 === 1);
        var bgColor = isOdd ? 'var(--primary)' : 'var(--primary-light)';
        var textColor = isOdd ? '#fff' : 'var(--primary)';
        
        var moduleNames = {
            'customer': '海外客户',
            'customer_cn': '国内客户',
            'resident_info': '当前居民信息数'
        };
        var moduleName = moduleNames[moduleId] || moduleId;
        var total = stats ? stats.total : 0;
        var recent = stats ? stats.recent : 0;
        
        var card = document.createElement('a');
        card.href = '/modules/' + moduleId + '/';
        card.className = 'clock-card module-card';
        card.setAttribute('draggable', 'true');
        card.setAttribute('data-module', moduleId);
        card.style.cssText = 'background-color:' + bgColor + ' !important;color:' + textColor + ' !important;border:none;height:100%;padding:0.75rem;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:grab;text-decoration:none;';
        
        card.innerHTML = 
            '<div class="card-title" style="font-size:1rem;font-weight:bold;margin-bottom:8px;">' + moduleName + '</div>' +
            '<div class="card-count" style="font-size:2rem;font-weight:bold;">' + total + '</div>' +
            '<div class="card-subtitle" style="font-size:0.75rem;opacity:0.75;margin-top:4px;">本周新增 ' + recent + ' 条</div>';
        
        return card;
    }

    function createRenderedCard(htmlContent, moduleId, position) {
        var temp = document.createElement('div');
        temp.innerHTML = htmlContent;
        var card = temp.firstElementChild;
        
        if (card) {
            card.classList.add('clock-card', 'module-card');
            card.setAttribute('draggable', 'true');
            card.dataset.module = moduleId;
        }
        
        return card || temp;
    }

    function createModuleCard(moduleId, templatePath, stats, position) {
        var isOdd = (position % 2 === 1);
        var bgColor = isOdd ? 'var(--primary)' : 'var(--primary-light)';
        var textColor = isOdd ? '#fff' : 'var(--primary)';
        
        var card = document.createElement('a');
        card.href = '/modules/' + moduleId + '/';
        card.className = 'clock-card module-card';
        card.setAttribute('draggable', 'true');
        card.setAttribute('data-module', moduleId);
        card.setAttribute('data-template', templatePath);
        card.style.cssText = 'background-color:' + bgColor + ' !important;color:' + textColor + ' !important;border:none;height:100%;padding:0.75rem;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:grab;text-decoration:none;';
        
        var moduleNames = {
            'whatsapp': '📱 WhatsApp 发送',
            'customer': '👥 客户信息',
            'customer_cn': '🏠 国内客户',
            'resident_info': '📋 居民信息'
        };
        var moduleName = moduleNames[moduleId] || moduleId;
        
        var total = stats ? stats.total : 0;
        var recent = stats ? stats.recent : 0;
        
        card.innerHTML = 
            '<div class="card-title" style="font-size:1rem;font-weight:bold;margin-bottom:8px;">' + moduleName + '</div>' +
            '<div class="card-count" style="font-size:2rem;font-weight:bold;">' + total + '</div>' +
            '<div class="card-subtitle" style="font-size:0.75rem;opacity:0.75;margin-top:4px;">本周新增 ' + recent + ' 条</div>';
        
        loadModuleTemplate(card, moduleId, templatePath);
        
        return card;
    }
    
    function loadModuleTemplate(card, moduleId, templatePath) {
        if (!templatePath) return;
        
        fetch('/modules/' + moduleId + '/templates/' + templatePath, {credentials: 'include'})
            .then(function(response) { return response.text(); })
            .then(function(html) {
                if (html) {
                    card.innerHTML = html;
                    card.style.cssText = '';
                    card.classList.add('module-custom-card');
                    var pos = card.closest('.card-slot');
                    if (pos) {
                        pos.classList.add('custom-loaded');
                    }
                }
            })
            .catch(function(err) {
                console.error('加载模块模板失败:', moduleId, err);
            });
    }

    function updateClock() {
        var now = new Date();
        var timeEl = document.querySelector('.clock-time');
        var dateWeekdayEl = document.querySelector('.clock-date-weekday');
        var lunarEl = document.querySelector('.clock-lunar');
        
        if (timeEl) {
            timeEl.textContent = now.toLocaleTimeString('zh-CN', {hour12: false});
        }
        if (dateWeekdayEl) {
            var dateStr = now.toLocaleDateString('zh-CN');
            var weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            var weekdayStr = weekdays[now.getDay()];
            dateWeekdayEl.textContent = dateStr + ' ' + weekdayStr;
        }
        if (lunarEl) {
            var lunar = getLunarDate(now);
            lunarEl.textContent = lunar.lunar;
        }
    }

    function renderCards() {
        var slots = document.querySelectorAll('.card-slot');
        
        fetch('/api/user/dashboard/cards/', {credentials: 'include'})
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success && data.data) {
                    var positions = data.data.positions || {};
                    var availableModules = data.data.available_modules || {};
                    var moduleStats = data.data.module_stats || {};
                    var moduleContents = data.data.module_contents || {};
                    
                    slots.forEach(function(slot) {
                        var position = slot.dataset.position;
                        var cardData = positions[position];
                        
                        if (cardData && cardData.module) {
                            var moduleId = cardData.module;
                            if (availableModules.indexOf(moduleId) === -1) return;
                            
                            if (moduleId === 'clock') {
                                var card = createClockCard(parseInt(position));
                                card.dataset.module = moduleId;
                                slot.appendChild(card);
                            } else if (moduleContents[moduleId]) {
                                slot.innerHTML = moduleContents[moduleId];
                            } else {
                                var card = createCustomerCard(moduleId, parseInt(position), moduleStats[moduleId]);
                                card.dataset.module = moduleId;
                                slot.appendChild(card);
                            }
                        }
                    });
                }
                
                initDragAndDrop();
            })
            .catch(function() {
                console.error('加载卡片失败');
                initDragAndDrop();
            });
    }

    function initDragAndDrop() {
        var cards = document.querySelectorAll('.module-card');
        var slots = document.querySelectorAll('.card-slot');
        
        cards.forEach(function(card) {
            card.addEventListener('dragstart', onDragStart);
            card.addEventListener('dragend', onDragEnd);
        });
        
        slots.forEach(function(slot) {
            slot.addEventListener('dragover', onDragOver);
            slot.addEventListener('drop', onDrop);
            slot.addEventListener('dragenter', onDragEnter);
            slot.addEventListener('dragleave', onDragLeave);
        });
    }

    function onDragStart(e) {
        draggingCard = e.target.closest('.module-card');
        draggingCard.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', '');
    }

    function onDragEnd(e) {
        if (draggingCard) {
            draggingCard.classList.remove('dragging');
        }
        document.querySelectorAll('.card-slot').forEach(function(slot) {
            slot.classList.remove('drag-over');
        });
    }

    function onDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
    }

    function onDragEnter(e) {
        e.preventDefault();
        var slot = e.target.closest('.card-slot');
        if (slot) slot.classList.add('drag-over');
    }

    function onDragLeave(e) {
        var slot = e.target.closest('.card-slot');
        if (slot && !slot.contains(e.relatedTarget)) {
            slot.classList.remove('drag-over');
        }
    }

    function onDrop(e) {
        e.preventDefault();
        var toSlot = e.target.closest('.card-slot');
        if (!toSlot || !draggingCard) return;
        
        var fromSlot = draggingCard.closest('.card-slot');
        if (fromSlot === toSlot) return;
        
        var newPosition = parseInt(toSlot.dataset.position);
        
        toSlot.innerHTML = '';
        toSlot.appendChild(draggingCard);
        
        draggingCard.classList.remove('dragging');
        draggingCard.classList.add('dragging');
        
        applyCardColor(draggingCard, newPosition);
        
        saveCardPositions();
        
        setTimeout(function() {
            draggingCard.classList.remove('dragging');
        }, 10);
    }

    // 初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            renderCards();
            updateClock();
            setInterval(updateClock, 1000);
        });
    } else {
        renderCards();
        updateClock();
        setInterval(updateClock, 1000);
    }
})();
</script>
