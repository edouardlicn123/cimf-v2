{% extends "base.html" %}

{% block title %}个人中心 - {{ system_name|default('仙芙CIMF') }}{% endblock %}

{% block content %}
<div class="d-flex flex-column" style="min-height: 100vh;">
  <div class="d-flex flex-grow-1">

    <!-- 左侧导航栏（个人中心专属 sidebar） -->
    <nav class="admin-sidebar flex-shrink-0 d-none d-md-block"
         style="width: 220px; min-width: 220px; background: var(--bg-surface, #f8f9fa); border-right: 1px solid var(--border-color, #dee2e6);">
      <div class="h-100 overflow-auto">
        <div class="position-sticky top-0 p-2 pt-4">
          <ul class="nav flex-column mb-auto">
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center py-2 px-2 rounded {% if active_section == 'profile' %}active{% endif %}" 
                 href="{{ url('core:profile_view') }}">
                <i class="bi bi-person me-2 fs-6"></i>
                个人信息
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center py-2 px-2 rounded {% if active_section == 'preferences' %}active{% endif %}" 
                 href="{{ url('core:profile_settings') }}">
                <i class="bi bi-sliders me-2 fs-6"></i>
                偏好设置
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link d-flex align-items-center py-2 px-2 rounded {% if active_section == 'homepage' %}active{% endif %}" 
                 href="{{ url('core:homepage_settings') }}">
                <i class="bi bi-grid me-2 fs-6"></i>
                首页设置
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- 右侧主内容区 -->
    <div class="flex-grow-1 overflow-auto px-4 py-4 py-md-5" style="background: var(--bg-body, #ffffff);">
      <div class="d-flex justify-content-between align-items-center mb-2 flex-nowrap">
        <h1 class="h2 mb-0 flex-grow-1 pe-3">
          {% block admin_title %}{% endblock %}
        </h1>
        <div class="ms-auto ps-4">
          {% block admin_title_buttons %}{% endblock %}
        </div>
      </div>

      <div class="pb-4">
        {% block admin_content %}{% endblock %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
