{% extends "core/frames/frame_dashboard.html" %}

{% block page_title %}仪表盘{% endblock %}

{% block page_content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">仪表盘</h2>
    </div>
</div>

<!-- 功能卡片区域 -->
<div class="row mt-4">
    <div class="col-12">
        <h5 class="mb-3">功能卡片</h5>
        <div id="dashboardCardsArea" class="row g-3">
            <div class="col-4 card-slot" data-position="1"></div>
            <div class="col-4 card-slot" data-position="2"></div>
            <div class="col-4 card-slot" data-position="3"></div>
            <div class="col-4 card-slot" data-position="4"></div>
            <div class="col-4 card-slot" data-position="5"></div>
            <div class="col-4 card-slot" data-position="6"></div>
        </div>
    </div>
</div>

<!-- 时钟卡片模板 -->
<template id="clock-card-template">
    {% include "clock/dashboard_card.html" %}
</template>

<div class="row mt-4">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">欢迎使用 {{ system_name|default("仙芙CIMF") }}</h5>
            </div>
            <div class="card-body">
                <p class="mb-2">{{ settings.welcome_subtitle|default("让我们一起把项目完善吧。") }}</p>
                <textarea class="form-control" rows="3" readonly>{{ settings.welcome_intro|default("初始用户名：admin 初始密码：admin123") }}</textarea>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<style>
.card-slot {
    min-height: 120px;
    border: 2px dashed transparent;
    border-radius: 0.5rem;
    transition: all 0.2s ease;
}
.card-slot.drag-over {
    border-color: var(--bs-primary);
    background-color: rgba(13, 110, 253, 0.05);
}
.clock-card {
    cursor: grab;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.clock-card:active {
    cursor: grabbing;
}
.clock-card.dragging {
    opacity: 0.5;
    transform: scale(0.95);
}
.clock-card .clock-time {
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
}
</style>
<script src="{{ static('js/dashboard_cards.js') }}?v={{ timestamp }}"></script>
{% endblock %}
