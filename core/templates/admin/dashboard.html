{% extends "frames/frame_admin.html" %}

{% set active_section = 'dashboard' %}

{% block admin_title %}管理后台{% endblock %}

{% block admin_content %}
<div class="row g-4">
  <div class="col-12">
    <h4 class="mb-3">概览</h4>
  </div>
  
  <div class="col-md-6 col-lg-3">
    <div class="card text-white bg-primary h-100">
      <div class="card-body">
        <h5 class="card-title">用户总数</h5>
        <p class="card-text display-4">{{ stats.total_users }}</p>
      </div>
    </div>
  </div>
  
  <div class="col-md-6 col-lg-3">
    <div class="card text-white bg-success h-100">
      <div class="card-body">
        <h5 class="card-title">活跃用户</h5>
        <p class="card-text display-4">{{ stats.active_users }}</p>
      </div>
    </div>
  </div>
  
  <div class="col-md-6 col-lg-3">
    <div class="card text-white bg-info h-100">
      <div class="card-body">
        <h5 class="card-title">系统设置</h5>
        <p class="card-text display-4">{{ settings_count }}</p>
      </div>
    </div>
  </div>
  
  <div class="col-md-6 col-lg-3">
    <div class="card text-white bg-warning h-100">
      <div class="card-body">
        <h5 class="card-title">词汇表</h5>
        <p class="card-text display-4">{{ taxonomy_count }}</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
