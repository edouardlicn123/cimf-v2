{% extends "core/frames/frame_importexport.html" %}

{% set show_nav = false %}
{% set show_header = false %}

{% block title %}正在导出 - {{ node_type.name }} - {{ system_name|default('仙芙CIMF') }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="text-center py-5 mt-5">
                <div class="mb-4">
                    <i class="bi bi-hourglass-split" style="font-size: 4rem; color: #0d6efd;"></i>
                </div>
                
                <h4>正在导出数据...</h4>
                <p class="text-muted mb-4">
                    正在导出 <strong>{{ node_type.name }}</strong>，请稍候
                </p>
                
                <div class="progress mb-3" style="height: 10px;">
                    <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" 
                         role="progressbar" style="width: 100%">
                    </div>
                </div>
                
                <p class="small text-muted">
                    即将自动开始下载...
                </p>
            </div>
        </div>
    </div>
</div>

<script>
window.onload = function() {
    setTimeout(function() {
        window.location.href = '{{ url("nodes:do_export", node_type.slug) }}';
    }, 500);
};
</script>
{% endblock %}
